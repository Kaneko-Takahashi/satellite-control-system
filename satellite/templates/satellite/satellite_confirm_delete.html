{% extends "satellite/base.html" %}

{% block title %}Delete Confirmation - Satellite Control System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card bg-dark border-danger">
            <div class="card-header text-danger">
                <h3><i class="bi bi-exclamation-triangle"></i> Delete Confirmation</h3>
            </div>
            <div class="card-body">
                <p class="lead">
                    Are you sure you want to delete this {{ type_name }}?
                </p>
                <div class="alert alert-danger">
                    <strong>{{ object }}</strong>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Delete
                        </button>
                        <a href="javascript:history.back()" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
